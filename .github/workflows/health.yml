name: Health — Checagem de Saúde do App

on:
  schedule:
    - cron: '0 10 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  run-health:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar endpoint de health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L \
            "${{ secrets.APP_URL }}/api/health?secret=${{ secrets.HEALTH_SECRET }}")
          echo "Status HTTP: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "207" ]; then
            echo "Health retornou status $STATUS"
            exit 1
          fi
