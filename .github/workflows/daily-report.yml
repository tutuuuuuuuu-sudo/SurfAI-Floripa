name: Daily Report — Resumo Diário do App

on:
  schedule:
    # 9h BRT (12h UTC) e 20h BRT (23h UTC)
    - cron: '0 12 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar nodemailer
        run: npm install nodemailer

      - name: Buscar dados e enviar relatório
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          APP_URL: ${{ secrets.APP_URL }}
          AGENT_SECRET: ${{ secrets.AGENT_SECRET }}
          REPORT_EMAIL: ${{ secrets.REPORT_EMAIL }}
        run: |
          node << 'EOF'
          const nodemailer = require('nodemailer')

          const GMAIL_USER = process.env.GMAIL_USER
          const GMAIL_APP_PASS = process.env.GMAIL_APP_PASS
          const APP_URL = process.env.APP_URL ?? 'https://surf-ai-floripa.vercel.app'
          const AGENT_SECRET = process.env.AGENT_SECRET
          const REPORT_EMAIL = process.env.REPORT_EMAIL ?? GMAIL_USER

          async function main() {
            if (!GMAIL_USER || !GMAIL_APP_PASS) {
              console.log('Credenciais Gmail não configuradas')
              process.exit(1)
            }

            console.log('Buscando dados do relatório...')
            const res = await fetch(`${APP_URL}/api/daily-report`, {
              headers: { 'x-agent-secret': AGENT_SECRET ?? '' }
            })

            if (!res.ok) {
              console.error(`Erro ao buscar relatório: HTTP ${res.status}`)
              process.exit(1)
            }

            const data = await res.json()
            const { period, date, users, surf, aiSummary } = data

            const hourBRT = (new Date().getUTCHours() - 3 + 24) % 24
            const greeting = hourBRT < 14 ? 'Bom dia' : 'Boa noite'

            function scoreColor(s) {
              return s >= 8 ? '#22c55e' : s >= 6 ? '#0ea5e9' : '#f59e0b'
            }
            function scoreLabel(s) {
              return s >= 8 ? 'ÉPICO' : s >= 7 ? 'EXCELENTE' : s >= 6 ? 'BOM' : s >= 5 ? 'REGULAR' : 'FRACO'
            }

            // Top 3 praias
            const top3Rows = (surf.top3 ?? []).map((s, i) => `
              <tr>
                <td style="padding:10px 14px;border-bottom:1px solid #1a1a1a;color:${i === 0 ? '#fff' : '#aaa'};font-weight:${i === 0 ? '700' : '400'}">${i === 0 ? '🥇 ' : i === 1 ? '🥈 ' : '🥉 '}${s.name}</td>
                <td style="padding:10px 14px;border-bottom:1px solid #1a1a1a;font-weight:700;color:${scoreColor(s.score)}">${s.score}</td>
                <td style="padding:10px 14px;border-bottom:1px solid #1a1a1a;color:#666;font-size:12px">${scoreLabel(s.score)}</td>
                <td style="padding:10px 14px;border-bottom:1px solid #1a1a1a;color:#555;font-size:12px">${s.waveHeight}m · ${s.swellPeriod}s · ${s.windSpeed}km/h</td>
              </tr>`).join('')

            // Tainha
            const tainhaBar = surf.tainhaSeasonActive
              ? `<div style="background:linear-gradient(135deg,#92400e20,#f59e0b20);border:1px solid #f59e0b40;border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px">
                  <span style="font-size:18px">🐟</span>
                  <div>
                    <p style="margin:0;font-size:12px;font-weight:700;color:#f59e0b">TEMPORADA DA TAINHA ATIVA</p>
                    <p style="margin:2px 0 0;font-size:11px;color:#666">Maio a Agosto — período de maior movimento nas praias</p>
                  </div>
                </div>`
              : ''

            const html = `
            <div style="font-family:sans-serif;max-width:600px;margin:0 auto;background:#0a0a0a;color:#fff;border-radius:16px;overflow:hidden">

              <!-- Header -->
              <div style="padding:28px 32px;background:linear-gradient(135deg,#6366f120,#0ea5e920);border-bottom:1px solid #222">
                <p style="margin:0 0 4px;font-size:12px;color:#6366f1;font-weight:600;letter-spacing:1px">RELATÓRIO ${period.toUpperCase()} · ${date}</p>
                <h1 style="margin:0;font-size:22px;font-weight:800">${greeting}! Aqui está o resumo do app</h1>
              </div>

              <div style="padding:28px 32px">

                <!-- Análise IA -->
                ${aiSummary ? `
                <div style="background:#111;border:1px solid #333;border-left:3px solid #6366f1;border-radius:8px;padding:16px;margin-bottom:24px">
                  <p style="margin:0 0 6px;font-size:11px;color:#6366f1;font-weight:600;letter-spacing:1px">ANÁLISE DE IA</p>
                  <p style="margin:0;color:#ccc;font-size:14px;line-height:1.6">${aiSummary}</p>
                </div>` : ''}

                <!-- Cards métricas -->
                <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:24px">
                  <tr>
                    <td width="50%" style="padding-right:6px;vertical-align:top">
                      <div style="background:#111;border:1px solid #222;border-radius:10px;padding:16px">
                        <p style="margin:0 0 4px;font-size:11px;color:#666;font-weight:600;letter-spacing:1px">USUÁRIOS TOTAIS</p>
                        <p style="margin:0;font-size:28px;font-weight:800">${users.total}</p>
                        <p style="margin:4px 0 0;font-size:12px;color:${users.newToday > 0 ? '#22c55e' : '#555'}">${users.newToday > 0 ? '+' + users.newToday + ' hoje' : '0 novos hoje'}</p>
                      </div>
                    </td>
                    <td width="50%" style="padding-left:6px;vertical-align:top">
                      <div style="background:#111;border:1px solid #222;border-radius:10px;padding:16px">
                        <p style="margin:0 0 4px;font-size:11px;color:#666;font-weight:600;letter-spacing:1px">PREMIUM ATIVO</p>
                        <p style="margin:0;font-size:28px;font-weight:800">${users.premiumActive}</p>
                        <p style="margin:4px 0 0;font-size:12px;color:${users.newPremiumToday > 0 ? '#22c55e' : '#555'}">${users.newPremiumToday > 0 ? '+' + users.newPremiumToday + ' hoje' : '0 novos hoje'}</p>
                      </div>
                    </td>
                  </tr>
                  <tr><td colspan="2" style="height:12px"></td></tr>
                  <tr>
                    <td width="50%" style="padding-right:6px;vertical-align:top">
                      <div style="background:#111;border:1px solid #222;border-radius:10px;padding:16px">
                        <p style="margin:0 0 4px;font-size:11px;color:#666;font-weight:600;letter-spacing:1px">RECEITA HOJE</p>
                        <p style="margin:0;font-size:28px;font-weight:800">R$ ${users.revenueToday.toFixed(2)}</p>
                        <p style="margin:4px 0 0;font-size:12px;color:${users.cancelledToday > 0 ? '#ef4444' : '#555'}">${users.cancelledToday > 0 ? users.cancelledToday + ' cancelamento(s)' : 'sem cancelamentos'}</p>
                      </div>
                    </td>
                    <td width="50%" style="padding-left:6px;vertical-align:top">
                      <div style="background:#111;border:1px solid #222;border-radius:10px;padding:16px">
                        <p style="margin:0 0 4px;font-size:11px;color:#666;font-weight:600;letter-spacing:1px">MRR ESTIMADO</p>
                        <p style="margin:0;font-size:28px;font-weight:800">R$ ${users.mrr.toFixed(2)}</p>
                        <p style="margin:4px 0 0;font-size:12px;color:#555">${users.conversionRate}% de conversão</p>
                      </div>
                    </td>
                  </tr>
                </table>

                <!-- Tainha -->
                ${surf.tainhaSeasonActive ? `
                <div style="background:#111;border:1px solid #333;border-radius:8px;padding:12px 16px;margin-bottom:16px">
                  <p style="margin:0;font-size:13px;color:#f59e0b;font-weight:600">🐟 Temporada da tainha ativa — maio a agosto</p>
                </div>` : ''}

                <!-- Top 3 praias -->
                <div style="background:#111;border:1px solid #222;border-radius:10px;overflow:hidden;margin-bottom:24px">
                  <div style="padding:12px 16px;border-bottom:1px solid #222">
                    <p style="margin:0;font-size:11px;color:#666;font-weight:600;letter-spacing:1px">TOP 3 PRAIAS AGORA · SCORE MÉDIO: ${surf.avgScore}/10</p>
                  </div>
                  <table width="100%" cellpadding="0" cellspacing="0">
                    ${top3Rows}
                  </table>
                </div>

                <!-- Status agentes + links -->
                <div style="background:#111;border:1px solid #222;border-radius:10px;padding:16px;margin-bottom:24px">
                  <p style="margin:0 0 12px;font-size:11px;color:#666;font-weight:600;letter-spacing:1px">STATUS DOS AGENTES</p>
                  <p style="margin:0 0 6px;font-size:13px;color:#ccc">✓ Email alert — agendado (6h e 15h BRT)</p>
                  <p style="margin:0 0 6px;font-size:13px;color:#ccc">✓ Agente de conteúdo — agendado (10h e 19h BRT)</p>
                  <p style="margin:0 0 16px;font-size:13px;color:#ccc">✓ Relatório diário — este email (9h e 20h BRT)</p>
                  <div style="border-top:1px solid #222;padding-top:12px">
                    <p style="margin:0 0 6px;font-size:12px;color:#555">
                      Histórico de execuções:
                      <a href="https://github.com/tutuuuuuuuu-sudo/SurfAI-Floripa/actions" style="color:#0ea5e9;text-decoration:none">github.com → Actions</a>
                    </p>
                    <p style="margin:0 0 6px;font-size:12px;color:#555">
                      Usuários no banco:
                      <a href="https://supabase.com/dashboard" style="color:#0ea5e9;text-decoration:none">supabase.com → Dashboard</a>
                    </p>
                    <p style="margin:0;font-size:12px;color:#555">
                      App ao vivo:
                      <a href="${APP_URL}" style="color:#0ea5e9;text-decoration:none">surf-ai-floripa.vercel.app</a>
                    </p>
                  </div>
                </div>

              </div>

              <!-- Footer -->
              <div style="padding:16px 32px;background:#111;text-align:center">
                <p style="margin:0;font-size:11px;color:#444">Surf AI Floripa · Relatório automático ${period.toLowerCase()} · ${date}</p>
              </div>

            </div>`

            const transporter = nodemailer.createTransport({
              service: 'gmail',
              auth: { user: GMAIL_USER, pass: GMAIL_APP_PASS }
            })

            await transporter.sendMail({
              from: `Surf AI Floripa <${GMAIL_USER}>`,
              to: REPORT_EMAIL,
              subject: `📊 Relatório ${period} ${date} — ${users.total} usuários · R$ ${users.mrr.toFixed(2)} MRR`,
              html,
            })

            console.log(`Relatório ${period} enviado para ${REPORT_EMAIL}`)
            console.log(`Usuários: ${users.total} total, +${users.newToday} hoje`)
            console.log(`Premium: ${users.premiumActive} ativos (${users.conversionRate}% conversão)`)
            console.log(`MRR: R$ ${users.mrr.toFixed(2)} · Receita hoje: R$ ${users.revenueToday.toFixed(2)}`)
            console.log(`Mar: ${surf.bestSpot} score ${surf.bestScore} (média ${surf.avgScore})`)
          }

          main().catch(e => { console.error(e); process.exit(1) })
          EOF
