name: Push Notify — Alertas de Swell

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-push-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar endpoint de push-notify
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L \
            "${{ secrets.APP_URL }}/api/push-notify?secret=${{ secrets.PUSH_NOTIFY_SECRET }}")
          echo "Status HTTP: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Push-notify retornou status $STATUS"
            exit 1
          fi
