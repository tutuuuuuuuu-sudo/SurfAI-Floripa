<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080f1a"/>
      <stop offset="100%" stop-color="#050c14"/>
    </linearGradient>
    <linearGradient id="ring-grad" x1="100" y1="100" x2="412" y2="412" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="60%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wave-grad" x1="120" y1="256" x2="392" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow-ring" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-wave" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="circle-clip">
      <circle cx="256" cy="256" r="148"/>
    </clipPath>
  </defs>

  <!-- Fundo -->
  <rect width="512" height="512" rx="112" fill="url(#bg2)"/>

  <!-- Anel externo — arco que some (tech/radar vibe) -->
  <circle cx="256" cy="256" r="190" stroke="url(#ring-grad)" stroke-width="1.5" stroke-opacity="0.4" fill="none" stroke-dasharray="6 10"/>

  <!-- Anel médio -->
  <circle cx="256" cy="256" r="148" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.15" fill="none"/>

  <!-- Anel interno com glow -->
  <circle cx="256" cy="256" r="148" stroke="url(#ring-grad)" stroke-width="2.5" fill="none" filter="url(#glow-ring)"
    stroke-dasharray="240 700" stroke-dashoffset="-60"/>

  <!-- Barras de sinal (tipo sensor/frequência) — dentro do círculo -->
  <!-- Barra esquerda baixa -->
  <rect x="148" y="296" width="18" height="40" rx="9" fill="url(#bar3)" opacity="0.7"/>
  <!-- Barra esquerda média -->
  <rect x="176" y="272" width="18" height="64" rx="9" fill="url(#bar2)" opacity="0.85"/>
  <!-- Barra esquerda alta -->
  <rect x="204" y="244" width="18" height="92" rx="9" fill="url(#bar1)"/>

  <!-- Barra direita alta -->
  <rect x="290" y="244" width="18" height="92" rx="9" fill="url(#bar1)"/>
  <!-- Barra direita média -->
  <rect x="318" y="272" width="18" height="64" rx="9" fill="url(#bar2)" opacity="0.85"/>
  <!-- Barra direita baixa -->
  <rect x="346" y="296" width="18" height="40" rx="9" fill="url(#bar3)" opacity="0.7"/>

  <!-- Onda central cortando as barras -->
  <path d="M130 256 C168 210, 212 302, 256 256 C300 210, 344 302, 382 256"
    stroke="url(#wave-grad)" stroke-width="22" stroke-linecap="round" fill="none"
    filter="url(#glow-wave)"/>

  <!-- Ponto central brilhante -->
  <circle cx="256" cy="256" r="10" fill="white" fill-opacity="0.95"/>
  <circle cx="256" cy="256" r="18" fill="#06b6d4" fill-opacity="0.25"/>
</svg>
